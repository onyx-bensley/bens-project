<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bensley's website</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-green: #00ff88;
    --neon-cyan: #00eeff;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --bg: #03050f;
    --panel: #060d1f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 14px;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    position: relative;
    touch-action: manipulation;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 100;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,238,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,238,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 10;
    display: flex; gap: 28px; align-items: flex-start;
  }

  .title {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2rem;
    letter-spacing: 0.3em; color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green), 0 0 40px var(--neon-green), 0 0 80px rgba(0,255,136,0.3);
    text-align: center; margin-bottom: 18px;
    animation: flicker 4s infinite; position: relative; z-index: 10;
  }

  @keyframes flicker {
    0%,95%,100%{opacity:1} 96%{opacity:.7} 97%{opacity:1} 98%{opacity:.4} 99%{opacity:1}
  }

  @keyframes swipeAnim {
    0%,100%{transform:translateY(0);opacity:1} 50%{transform:translateY(-6px);opacity:.6}
  }

  /* Canvas */
  .canvas-frame {
    padding: 3px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-green));
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(0,238,255,.4), 0 0 60px rgba(0,238,255,.15), inset 0 0 20px rgba(0,0,0,.5);
  }
  .canvas-inner { background: var(--bg); border-radius: 2px; padding: 4px; position: relative; }
  canvas { display: block; image-rendering: pixelated; }

  /* Panneaux — desktop */
  .side-panel { display: flex; flex-direction: column; gap: 16px; width: 160px; }

  .panel-box {
    background: var(--panel); border: 1px solid rgba(0,238,255,.2);
    border-radius: 4px; padding: 14px 16px; position: relative; overflow: hidden;
  }
  .panel-box::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  }
  .panel-label { font-size:.6rem; letter-spacing:.2em; color:var(--neon-cyan); text-transform:uppercase; margin-bottom:6px; opacity:.7; }
  .panel-value { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:700; color:var(--neon-green); text-shadow:0 0 10px var(--neon-green); }
  .panel-value.hi { color:var(--neon-yellow); text-shadow:0 0 10px var(--neon-yellow); font-size:1.4rem; }

  .speed-bar-track { height:6px; background:rgba(255,255,255,.05); border-radius:3px; margin-top:8px; overflow:hidden; }
  .speed-bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink)); box-shadow:0 0 8px var(--neon-cyan); transition:width .3s ease; width:10%; }

  .controls { background:var(--panel); border:1px solid rgba(255,45,120,.2); border-radius:4px; padding:14px 16px; }
  .controls-label { font-size:.55rem; letter-spacing:.2em; color:var(--neon-pink); text-transform:uppercase; margin-bottom:10px; opacity:.8; }

  .swipe-hint { display:flex; flex-direction:column; align-items:center; gap:4px; }

  /* Overlays */
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(3,5,15,.88); border-radius:2px; z-index:20; gap:16px;
  }
  .overlay.hidden { display:none; }
  .overlay-title { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; letter-spacing:.2em; }
  .overlay-title.green { color:var(--neon-green); text-shadow:0 0 20px var(--neon-green); }
  .overlay-title.red   { color:var(--neon-pink);  text-shadow:0 0 20px var(--neon-pink); }
  .overlay-sub { color:rgba(255,255,255,.4); font-size:.75rem; letter-spacing:.15em; }

  .btn {
    font-family:'Orbitron',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:.15em;
    padding:10px 28px; border:none; border-radius:3px; cursor:pointer;
    background:var(--neon-green); color:#000; box-shadow:0 0 20px rgba(0,255,136,.4);
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active { transform:scale(1.05); box-shadow:0 0 30px rgba(0,255,136,.7); }

  .score-display { font-family:'Orbitron',sans-serif; font-size:1rem; color:var(--neon-yellow); text-shadow:0 0 10px var(--neon-yellow); letter-spacing:.1em; }

  /* ===== MOBILE : 4 carrés ===== */
  @media (max-width: 700px) {
    body { padding-top: 24px; }
    .title { font-size: 1.3rem; letter-spacing: 0.1em; margin-bottom: 8px; }
    .wrapper { flex-direction: column; align-items: center; gap: 8px; }

    .side-panel {
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 5px;
      width: auto;
      align-items: stretch;
    }

    /* Tous les panneaux en carré 76×76 */
    .panel-box,
    .controls {
      width: 76px !important;
      height: 76px !important;
      min-width: 76px;
      min-height: 76px;
      padding: 0 !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .panel-label   { font-size: 0.45rem; margin-bottom: 2px; letter-spacing: 0.1em; }
    .panel-value   { font-size: 1.35rem; }
    .panel-value.hi{ font-size: 1.1rem; }

    .speed-bar-track { width: 54px; margin-top: 3px; }

    .controls-label { font-size: 0.43rem; margin-bottom: 2px; }
    .swipe-hint { gap: 1px; }
    .swipe-hint > .swipe-icon { font-size: 1.2rem; animation: swipeAnim 2s ease-in-out infinite; }
    .swipe-hint > .swipe-text { font-size: 0.37rem; line-height: 1.4; color: rgba(0,238,255,0.7); letter-spacing: 0.08em; }
    #btnPause { margin-top: 3px !important; width: 88% !important; font-size: 0.38rem !important; padding: 3px 0 !important; }

    canvas { width: 340px !important; height: 340px !important; }
  }
</style>
</head>
<body>

<div style="position:relative;z-index:10;text-align:center;">
  <div class="title">Créé par Bensley</div>

  <div class="wrapper">
    <div class="side-panel">
      <div class="panel-box">
        <div class="panel-label">Score</div>
        <div class="panel-value" id="scoreDisplay">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Meilleur</div>
        <div class="panel-value hi" id="hiDisplay">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">Vitesse</div>
        <div class="panel-value" id="lvlDisplay">1</div>
        <div class="speed-bar-track"><div class="speed-bar-fill" id="speedBar"></div></div>
      </div>
      <div class="controls">
        <button id="btnPause" onclick="togglePause()" style="width:100%;background:rgba(255,45,120,0.1);border:1px solid rgba(255,45,120,0.4);border-radius:4px;color:var(--neon-pink);font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.15em;padding:8px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;">⏸ PAUSE</button>
      </div>
    </div>

    <div>
      <div class="canvas-frame">
        <div class="canvas-inner">
          <canvas id="gameCanvas" width="400" height="400"></canvas>

          <div class="overlay" id="startOverlay">
            <div class="overlay-title green">PRÊT ?</div>
            <div class="swipe-hint" style="gap:6px;">
              <div style="font-size:2.2rem;animation:swipeAnim 2s ease-in-out infinite;">👆</div>
              <div class="overlay-sub">GLISSE TON DOIGT POUR DIRIGER</div>
            </div>
            <div class="overlay-sub" style="margin-top:4px;">APPUIE SUR <span style="color:var(--neon-green);font-weight:bold;">JOUER</span> POUR COMMENCER</div>
            <button class="btn" onclick="startGame()">JOUER</button>
          </div>

          <div class="overlay hidden" id="gameOverOverlay">
            <div class="overlay-title red">GAME OVER</div>
            <div class="score-display" id="finalScore"></div>
            <button class="btn" onclick="startGame()">REJOUER</button>
          </div>

          <div class="overlay hidden" id="pauseOverlay">
            <div class="overlay-title green">PAUSE</div>
            <div class="overlay-sub">APPUIE SUR PAUSE POUR REPRENDRE</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const COLS=20, ROWS=20, CELL=canvas.width/COLS;

const C = {
  bg:'#03050f', gridLine:'rgba(0,238,255,0.04)',
  snakeHead:'#00ff88', snakeBody:'#00cc6a', snakeGlow:'rgba(0,255,136,0.6)',
  food:'#ff2d78', foodGlow:'rgba(255,45,120,0.8)',
  bonus:'#ffe600', bonusGlow:'rgba(255,230,0,0.8)',
};

let snake,dir,nextDir,food,bonus,score,hi,speed,paused,alive;
let bonusTimer=0,bonusActive=false,particles=[],foodPulse=0;

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; speed=1; paused=false; alive=true;
  particles=[]; bonusActive=false; bonusTimer=0;
  placeFood(); updateUI();
}

function placeFood(){
  do{ food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function placeBonus(){
  do{ bonus={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===bonus.x&&s.y===bonus.y)||(bonus.x===food.x&&bonus.y===food.y));
  bonusActive=true; bonusTimer=80;
}

function startGame(){
  ['startOverlay','gameOverOverlay','pauseOverlay'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  hi=parseInt(localStorage.getItem('snakeHi')||'0');
  document.getElementById('hiDisplay').textContent=hi;
  init(); requestAnimationFrame(loop);
}

let lastTime=0,elapsed=0;
function getInterval(){ return Math.max(80,200-(speed-1)*15); }

function loop(ts){
  if(!alive) return;
  if(paused){ requestAnimationFrame(loop); return; }
  elapsed+=ts-(lastTime||ts); lastTime=ts;
  if(elapsed>=getInterval()){ elapsed=0; update(); }
  draw(); requestAnimationFrame(loop);
}

function update(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return die();
  if(snake.some(s=>s.x===head.x&&s.y===head.y)) return die();
  snake.unshift(head);
  let ate=false;
  if(head.x===food.x&&head.y===food.y){
    score+=10; ate=true; spawnParticles(food.x,food.y,C.food);
    placeFood(); if(score%50===0&&!bonusActive) placeBonus();
    speed=Math.min(10,1+Math.floor(score/60)); updateUI();
  } else if(bonusActive&&head.x===bonus.x&&head.y===bonus.y){
    score+=30; ate=true; spawnParticles(bonus.x,bonus.y,C.bonus); bonusActive=false; updateUI();
  }
  if(!ate) snake.pop();
  if(bonusActive){ bonusTimer--; if(bonusTimer<=0) bonusActive=false; }
  foodPulse=(foodPulse+0.12)%(Math.PI*2);
}

function die(){
  alive=false; spawnParticles(snake[0].x,snake[0].y,C.snakeHead,20);
  if(score>hi){ hi=score; localStorage.setItem('snakeHi',hi); }
  setTimeout(()=>{
    document.getElementById('finalScore').textContent=`SCORE : ${score}  |  MEILLEUR : ${hi}`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  },600);
}

function spawnParticles(gx,gy,color,count=12){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({x:(gx+.5)*CELL,y:(gy+.5)*CELL,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:2+Math.random()*3});
  }
}

function draw(){
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=C.gridLine; ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke();}

  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=0.04;
  });
  ctx.globalAlpha=1;

  const fr=CELL*(0.5+0.15*Math.sin(foodPulse))*0.4;
  const fx=(food.x+.5)*CELL, fy=(food.y+.5)*CELL;
  ctx.shadowColor=C.foodGlow; ctx.shadowBlur=18; ctx.fillStyle=C.food;
  ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(fx-fr*.25,fy-fr*.25,fr*.2,0,Math.PI*2); ctx.fill();

  if(bonusActive){
    const br=CELL*(0.5+0.2*Math.sin(foodPulse*1.5))*0.45;
    const bx=(bonus.x+.5)*CELL, by=(bonus.y+.5)*CELL;
    ctx.shadowColor=C.bonusGlow; ctx.shadowBlur=22; ctx.fillStyle=C.bonus;
    ctx.save(); ctx.translate(bx,by); ctx.rotate(foodPulse*0.5);
    drawStar(ctx,0,0,5,br,br*0.45); ctx.fill(); ctx.restore(); ctx.shadowBlur=0;
    const barW=(bonusTimer/80)*CELL*0.9;
    ctx.fillStyle='rgba(255,230,0,0.15)';
    ctx.fillRect(bonus.x*CELL+CELL*.05,bonus.y*CELL+CELL*.88,CELL*.9,3);
    ctx.fillStyle=C.bonus;
    ctx.fillRect(bonus.x*CELL+CELL*.05,bonus.y*CELL+CELL*.88,barW,3);
  }

  snake.forEach((seg,i)=>{
    const isHead=i===0, t=i/snake.length;
    const x=seg.x*CELL, y=seg.y*CELL, pad=isHead?1:2, r=isHead?5:3;
    ctx.globalAlpha=isHead?1:(1-t*0.5);
    ctx.shadowColor=isHead?C.snakeGlow:'rgba(0,255,136,0.3)';
    ctx.shadowBlur=isHead?16:6;
    ctx.fillStyle=isHead?C.snakeHead:C.snakeBody;
    roundRect(ctx,x+pad,y+pad,CELL-pad*2,CELL-pad*2,r); ctx.fill();
    if(isHead){
      ctx.shadowBlur=0; ctx.fillStyle='#000'; ctx.globalAlpha=1;
      if(dir.x!==0){
        ctx.beginPath();ctx.arc(x+CELL*.65,y+CELL*.3,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(x+CELL*.65,y+CELL*.7,2.5,0,Math.PI*2);ctx.fill();
      } else {
        ctx.beginPath();ctx.arc(x+CELL*.3,y+CELL*.65,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(x+CELL*.7,y+CELL*.65,2.5,0,Math.PI*2);ctx.fill();
      }
    }
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawStar(ctx,cx,cy,spikes,outerR,innerR){
  ctx.beginPath();
  for(let i=0;i<spikes*2;i++){
    const r=i%2===0?outerR:innerR, angle=(i*Math.PI)/spikes-Math.PI/2;
    i===0?ctx.moveTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle)):ctx.lineTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle));
  }
  ctx.closePath();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function updateUI(){
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('hiDisplay').textContent=hi||0;
  document.getElementById('lvlDisplay').textContent=speed;
  document.getElementById('speedBar').style.width=Math.min(100,(speed/10)*100)+'%';
}

// Clavier desktop
document.addEventListener('keydown',e=>{
  switch(e.key){
    case 'ArrowUp':   case 'w': if(dir.y!==1)  nextDir={x:0,y:-1}; e.preventDefault(); break;
    case 'ArrowDown': case 's': if(dir.y!==-1) nextDir={x:0,y:1};  e.preventDefault(); break;
    case 'ArrowLeft': case 'a': if(dir.x!==1)  nextDir={x:-1,y:0}; e.preventDefault(); break;
    case 'ArrowRight':case 'd': if(dir.x!==-1) nextDir={x:1,y:0};  e.preventDefault(); break;
    case ' ': if(!alive)return; paused=!paused; document.getElementById('pauseOverlay').classList.toggle('hidden',!paused); e.preventDefault(); break;
  }
});

function togglePause(){
  if(!alive) return;
  paused=!paused;
  document.getElementById('pauseOverlay').classList.toggle('hidden',!paused);
  document.getElementById('btnPause').textContent=paused?'▶ REPRENDRE':'⏸ PAUSE';
}

// Swipe — détecte glissement sans bloquer les taps sur les boutons
let tx=0,ty=0,moved=false;

document.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY; moved=false;
},{passive:true});

document.addEventListener('touchmove',e=>{
  const adx=Math.abs(e.touches[0].clientX-tx), ady=Math.abs(e.touches[0].clientY-ty);
  if(adx>8||ady>8){ moved=true; e.preventDefault(); }
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!moved) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  if(Math.max(adx,ady)<8) return;
  if(adx>ady){
    if(dx>0){if(dir.x!==-1)nextDir={x:1,y:0};}
    else    {if(dir.x!==1) nextDir={x:-1,y:0};}
  } else {
    if(dy>0){if(dir.y!==-1)nextDir={x:0,y:1};}
    else    {if(dir.y!==1) nextDir={x:0,y:-1};}
  }
},{passive:true});

ctx.fillStyle=C.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>
